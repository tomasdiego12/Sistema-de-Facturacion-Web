<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Facturacion Web</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>

    <header>
        <h1>🛒 Supermercado JS</h1>
        
        <input type="text" id="buscador" placeholder="Buscar producto...">
    </header>

    <main class="main-container">
        
        <section id="container-products">
            </section>

        <aside class="shopping-cart">
            <h2>Ticket de Compra</h2>
            <ul id="shopping-cart-list"></ul>

            <div class="total-pay">
                <p>SubTotal: <span id="subtotal-price">0.00</span></p>
                <p>Descuento: <span id="discount-price">0.00</span></p>
                <p>Iva: <span id="iva-price">0.00</span></p>

                <hr><h3>Total: $<span id="total-price">0</span></h3> 
            </div>

            <button id="btn-buy">Finalizar Compra</button>
        </aside>
    </main>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="./js/ui.js"></script>
</body>
</html>
